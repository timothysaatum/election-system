user nginx;
worker_processes auto;                  # one per CPU core
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security: hide version banner ────────────────────────────────────────
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # Max upload size — covers candidate photo uploads (5 MB limit in app)
    client_max_body_size 10M;

    # Buffers
    client_body_buffer_size    128k;
    client_header_buffer_size    1k;
    large_client_header_buffers  4 16k;
    output_buffers               1 32k;
    postpone_output           1460;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;
    gzip_disable "msie6";

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # General API calls — 20 req/s burst allowed
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=20r/s;
    # Auth endpoint — tighter: 5 req/min per IP
    limit_req_zone  $binary_remote_addr zone=login_limit:10m rate=5r/m;
    # Concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Proxy cache — used for upload/image serving ───────────────────────────
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=uploads_cache:5m
                     max_size=200m
                     inactive=7d
                     use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}