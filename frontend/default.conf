server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────────
    # Applied to every response from this server block.
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    # CSP: tighten as needed once you know which external resources are used
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';"
        always;

    # ── Connection limit ─────────────────────────────────────────────────────
    limit_conn addr 20;

    # ── Frontend static files ─────────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /index.html;

        # Cache static assets aggressively; React build hashes filenames
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # Never cache the HTML entry point (it references hashed asset names)
        location = /index.html {
            add_header  Cache-Control "no-cache, no-store, must-revalidate";
            add_header  Pragma        "no-cache";
            expires     0;
        }
    }

    # ── Auth endpoint — strict rate limit ────────────────────────────────────
    location /api/auth/verify-id {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000/api/auth/verify-id;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000/api/auth/login;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # ── SSE streaming endpoints — special proxy settings ─────────────────────
    # SSE requires: no buffering, long read timeout, HTTP/1.1, no caching.
    location ~ ^/api/admin/stream/ {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # HTTP/1.1 is required for keepalive / chunked transfer
        proxy_http_version 1.1;

        # Disable ALL buffering — SSE must stream immediately to the client
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;  # 1 hour — keep SSE connections alive
        proxy_send_timeout      3600s;

        # Tell Nginx not to buffer the response body
        proxy_set_header        X-Accel-Buffering "no";

        # Prevent any intermediate caches from storing the stream
        add_header              Cache-Control "no-cache, no-store" always;
        add_header              X-Accel-Buffering "no"             always;
    }

    # ── General API proxy ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  15s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffer settings for regular API responses
        proxy_buffers           8 16k;
        proxy_buffer_size       32k;
        proxy_busy_buffers_size 64k;
    }

    # ── Static upload serving — direct from shared volume ────────────────────
    # Uploads are written to the election_uploads volume by the backend
    # and read here by Nginx directly — no backend round-trip.
    location /uploads/ {
        alias /usr/share/nginx/uploads/;

        # Only serve known image types — block arbitrary file access
        location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
            expires    30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Deny access to anything that isn't an image
        location ~ {
            return 403;
        }
    }

    # ── Health check — no auth, no logging ───────────────────────────────────
    location = /healthcheck {
        access_log  off;
        return 200  "healthy\n";
        add_header  Content-Type text/plain;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup and config files
    location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── 429 custom error page ─────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"detail":"Too many requests. Please slow down."}';
    }
}